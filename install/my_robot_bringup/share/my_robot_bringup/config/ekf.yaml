### ekf.yaml - Extended Kalman Filter Configuration
### For robot_localization package
### Fuses wheel odometry and IMU data for improved pose estimation

ekf_filter_node:
  ros__parameters:
    # ====================================================================
    # GENERAL SETTINGS
    # ====================================================================
    
    # The frequency, in Hz, at which the filter will output a position estimate
    frequency: 30.0
    
    # The period, in seconds, after which we consider a sensor to have timed out
    sensor_timeout: 0.1
    
    # If true, will publish the transform from the odom_frame to the base_link_frame
    # This should be TRUE since EKF is responsible for the odom -> base_link transform
    publish_tf: true
    
    # If true, will publish the acceleration state
    publish_acceleration: false
    
    # ====================================================================
    # FRAME DEFINITIONS
    # ====================================================================
    
    # The frame representing the robot's odometry origin
    # This is the parent frame for odometry
    odom_frame: odom
    
    # The frame attached to the robot's base
    # This is the child frame for odometry
    base_link_frame: base_link
    
    # The frame representing the robot's position in the world
    # Leave as 'odom' for now (no map frame until we add SLAM)
    world_frame: odom
    
    # ====================================================================
    # SENSOR INPUTS
    # ====================================================================
    
    # Two data sources:
    # odom0: Raw wheel odometry from ESP32 bridge
    # imu0: IMU data (accel + gyro) from ESP32 bridge
    
    # --------------------------------------------------------------------
    # ODOM0: Wheel Odometry from ESP32 (via /odom/raw topic)
    # --------------------------------------------------------------------
    odom0: /odom/raw
    odom0_config: [
      false,  # x position - Don't use (will drift over time)
      false,  # y position - Don't use (will drift over time)
      false,  # z position - Not applicable for 2D robot
      false,  # roll - Not applicable for 2D robot
      false,  # pitch - Not applicable for 2D robot
      false,  # yaw - Don't use (prefer IMU gyro for rotation)
      true,   # x velocity - USE (from wheel encoders)
      true,   # y velocity - USE (should be ~0 for diff drive)
      false,  # z velocity - Not applicable for 2D robot
      false,  # roll velocity - Not applicable
      false,  # pitch velocity - Not applicable
      true    # yaw velocity - USE (from differential drive kinematics)
    ]
    
    # Differential mode for odometry (use velocity, not position)
    odom0_differential: false
    
    # Relative mode (use relative measurements)
    odom0_relative: false
    
    # Queue size for odometry messages
    odom0_queue_size: 10
    
    # Process noise covariance for odometry
    # Higher values = less trust in odometry
    odom0_pose_rejection_threshold: 5.0
    odom0_twist_rejection_threshold: 1.0
    
    # --------------------------------------------------------------------
    # IMU0: Inertial Measurement Unit from ESP32 (via /imu/data topic)
    # --------------------------------------------------------------------
    imu0: /imu/data
    imu0_config: [
      false,  # x position - Not provided by IMU
      false,  # y position - Not provided by IMU
      false,  # z position - Not provided by IMU
      false,  # roll - Don't use (2D robot, should be ~0)
      false,  # pitch - Don't use (2D robot, should be ~0)
      true,   # yaw - USE (integrated from gyro, better than odometry)
      false,  # x velocity - Not directly measured
      false,  # y velocity - Not directly measured
      false,  # z velocity - Not applicable
      false,  # roll velocity - Not applicable for 2D
      false,  # pitch velocity - Not applicable for 2D
      true    # yaw velocity - USE (gyro measurement, most reliable)
    ]
    
    # Differential mode for IMU
    imu0_differential: false
    
    # Relative mode
    imu0_relative: true
    
    # Queue size for IMU messages
    imu0_queue_size: 10
    
    # Remove gravitational acceleration (IMU is assumed to measure it)
    imu0_remove_gravitational_acceleration: true
    
    # Process noise covariance for IMU
    imu0_pose_rejection_threshold: 0.8
    imu0_twist_rejection_threshold: 0.8
    imu0_linear_acceleration_rejection_threshold: 0.8
    
    # ====================================================================
    # PROCESS NOISE COVARIANCE
    # ====================================================================
    
    # Process noise covariance matrix
    # Diagonal matrix representing uncertainty in the prediction model
    # Format: [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    # Higher values = model is less trusted, sensors are more trusted
    
    process_noise_covariance: [
      0.05,   # x position variance
      0.05,   # y position variance
      0.06,   # z position variance
      0.03,   # roll variance
      0.03,   # pitch variance
      0.06,   # yaw variance
      0.025,  # x velocity variance
      0.025,  # y velocity variance
      0.04,   # z velocity variance
      0.01,   # roll velocity variance
      0.01,   # pitch velocity variance
      0.02,   # yaw velocity variance
      0.01,   # x acceleration variance
      0.01,   # y acceleration variance
      0.01    # z acceleration variance
    ]
    
    # ====================================================================
    # INITIAL STATE COVARIANCE
    # ====================================================================
    
    # Initial estimate error covariance matrix
    # Represents initial uncertainty in the robot's state
    # Same format as process_noise_covariance
    
    initial_estimate_covariance: [
      1.0,    # x position
      1.0,    # y position
      1e-9,   # z position (2D robot)
      1e-9,   # roll (2D robot)
      1e-9,   # pitch (2D robot)
      1.0,    # yaw
      1.0,    # x velocity
      1.0,    # y velocity
      1e-9,   # z velocity
      1e-9,   # roll velocity
      1e-9,   # pitch velocity
      1.0,    # yaw velocity
      1e-9,   # x acceleration
      1e-9,   # y acceleration
      1e-9    # z acceleration
    ]
    
    # ====================================================================
    # ADVANCED SETTINGS
    # ====================================================================
    
    # Use control input (cmd_vel) to improve prediction
    # Set to false for now, can enable later if needed
    use_control: false
    
    # Stamped control (if use_control is true)
    stamped_control: false
    
    # Control timeout
    control_timeout: 0.2
    
    # Enable 2D mode (constrains z, roll, pitch to zero)
    two_d_mode: true
    
    # Enable debug output
    print_diagnostics: false
    
    # Smooth Lagged Data (helps with sensor synchronization)
    smooth_lagged_data: false
    
    # History length for smoothing
    history_length: 0.0
    
    # ====================================================================
    # DYNAMIC RECONFIGURE (for runtime parameter tuning)
    # ====================================================================
    
    # Enable dynamic reconfigure server
    # Allows changing parameters without restarting the node
    dynamic_process_noise_covariance: false
