### ekf.yaml - Extended Kalman Filter Configuration
### For robot_localization package
### Fuses wheel odometry and IMU data for improved pose estimation

ekf_filter_node:
  ros__parameters:
    # ====================================================================
    # GENERAL SETTINGS
    # ====================================================================

    # The frequency, in Hz, at which the filter will output a position estimate
    frequency: 30.0

    # The period, in seconds, after which we consider a sensor to have timed out
    sensor_timeout: 0.1

    # If true, will publish the transform from the odom_frame to the base_link_frame
    publish_tf: true

    # Acceleration state publishing is not needed for 2D navigation
    publish_acceleration: false

    # ====================================================================
    # FRAME DEFINITIONS
    # ====================================================================

    odom_frame:      odom
    base_link_frame: base_link
    world_frame:     odom   # No map frame until SLAM is added

    # ====================================================================
    # SENSOR INPUTS
    # ====================================================================

    # Two data sources:
    #   odom0 – raw wheel odometry from the ESP32 bridge  (/odom/raw)
    #   imu0  – gyroscope + accelerometer from the ESP32  (/imu/data)

    # --------------------------------------------------------------------
    # ODOM0: Wheel Odometry  →  /odom/raw
    # --------------------------------------------------------------------
    odom0: /odom/raw

    # FIX: For a differential drive robot the odometry is reliable for
    # x/y position and yaw, plus their velocity equivalents.
    # Enable absolute pose (x, y, yaw) AND velocities (vx, vyaw).
    # y-velocity is included but will be ~0; the EKF handles this correctly.
    odom0_config: [
      true,   # x             – use absolute position from integrated odometry
      true,   # y
      false,  # z             – 2D robot
      false,  # roll
      false,  # pitch
      true,   # yaw           – use integrated yaw from encoders
      true,   # x velocity
      false,  # y velocity    – diff-drive: no lateral movement
      false,  # z velocity
      false,  # roll velocity
      false,  # pitch velocity
      true,   # yaw velocity
      false,  # x acceleration
      false,  # y acceleration
      false   # z acceleration
    ]

    odom0_differential: false  # Use absolute pose, not deltas
    odom0_relative:     false
    odom0_queue_size:   10

    odom0_pose_rejection_threshold:  5.0
    odom0_twist_rejection_threshold: 1.0

    # --------------------------------------------------------------------
    # IMU0: Inertial Measurement Unit  →  /imu/data
    # --------------------------------------------------------------------
    imu0: /imu/data

    # FIX: Use only yaw velocity (gz) from the IMU.
    # No absolute orientation is available (no magnetometer), and
    # accelerations are not useful for 2D ground-robot localization.
    imu0_config: [
      false,  # x
      false,  # y
      false,  # z
      false,  # roll
      false,  # pitch
      false,  # yaw      – no magnetometer → no absolute heading
      false,  # x velocity
      false,  # y velocity
      false,  # z velocity
      false,  # roll velocity
      false,  # pitch velocity
      true,   # yaw velocity  – use gyroscope gz (primary fusion signal)
      false,  # x acceleration
      false,  # y acceleration
      false   # z acceleration
    ]

    imu0_differential: false
    imu0_relative:     true   # IMU provides relative (not world-referenced) data
    imu0_queue_size:   10

    # FIX: Enable gravitational removal so the EKF sees only dynamic acceleration
    imu0_remove_gravitational_acceleration: true

    imu0_pose_rejection_threshold:                0.8
    imu0_twist_rejection_threshold:               0.8
    imu0_linear_acceleration_rejection_threshold: 0.8

    # ====================================================================
    # PROCESS NOISE COVARIANCE
    # ====================================================================
    # Diagonal of the 15×15 Q matrix.
    # Order: x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az
    # Higher value = less trust in the prediction model.

    process_noise_covariance: [
      0.05,   # x
      0.05,   # y
      0.06,   # z
      0.03,   # roll
      0.03,   # pitch
      0.06,   # yaw
      0.025,  # vx
      0.025,  # vy
      0.04,   # vz
      0.01,   # vroll
      0.01,   # vpitch
      0.02,   # vyaw
      0.01,   # ax
      0.01,   # ay
      0.01    # az
    ]

    # ====================================================================
    # INITIAL STATE COVARIANCE
    # ====================================================================
    # Represents initial uncertainty in the robot's state.
    # Same order as process_noise_covariance.

    initial_estimate_covariance: [
      1.0,    # x
      1.0,    # y
      1e-9,   # z       (2D robot – constrained)
      1e-9,   # roll
      1e-9,   # pitch
      1.0,    # yaw
      1.0,    # vx
      1.0,    # vy
      1e-9,   # vz
      1e-9,   # vroll
      1e-9,   # vpitch
      1.0,    # vyaw
      1e-9,   # ax
      1e-9,   # ay
      1e-9    # az
    ]

    # ====================================================================
    # ADVANCED SETTINGS
    # ====================================================================

    use_control:     false
    stamped_control: false
    control_timeout: 0.2

    # Constrain z, roll, pitch to zero for a planar robot
    two_d_mode: true

    print_diagnostics: false

    # FIX: Enable smooth_lagged_data to compensate for serial timing jitter
    # between the ESP32 publish rate and the ROS clock.
    smooth_lagged_data: true
    history_length:     0.2   # seconds of history to maintain

    dynamic_process_noise_covariance: false
